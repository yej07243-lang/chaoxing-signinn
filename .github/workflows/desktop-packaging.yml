name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/desktop/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/desktop-packaging.yml'

jobs:
  package-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate packaging assets
        run: pnpm --filter chaoxing-sign-desktop assets

      - name: Build macOS installers
        run: pnpm --filter chaoxing-sign-desktop make:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chaoxing-sign-desktop-macos
          path: apps/desktop/out/make/**

  package-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate packaging assets
        run: pnpm --filter chaoxing-sign-desktop assets

      - name: Build Windows installers
        run: pnpm --filter chaoxing-sign-desktop make:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chaoxing-sign-desktop-windows
          path: apps/desktop/out/make/**
